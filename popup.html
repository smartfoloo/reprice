<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=LINE+Seed+JP&display=swap');

    body {
      width: 300px;
      padding: 16px;
      font-family: 'LINE Seed JP', sans-serif;
      font-size: 13px;
    }

    h1 {
      font-size: 18px;
      margin: 0 0 12px;
      font-weight: 800;
    }

    h2 {
      font-size: 14px;
    }

    p {
      line-height: 1.5;
    }

    .toggle-section {
      margin-bottom: 16px;
    }

    .toggle-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #eee;
    }

    .toggle-item:last-child {
      border-bottom: none;
    }

    .section-title {
      font-weight: 600;
      font-size: 12px;
      color: #0066cc;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .toggle-label {
      font-weight: 500;
    }

    .toggle-switch {
      position: relative;
      width: 44px;
      height: 24px;
    }

    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: 0.3s;
      border-radius: 24px;
    }

    .toggle-slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: 0.3s;
      border-radius: 50%;
    }

    input:checked+.toggle-slider {
      background-color: #0066cc;
    }

    input:checked+.toggle-slider:before {
      transform: translateX(20px);
    }

    .compatability-chart {
      width: 100%;
      margin-top: 8px;
    }

    th, td {
      padding: 5px;
    }

    .table-icon {
      font-size: 18px;
    }

    .info {
      background: #f0f7ff;
      border: 1px solid #cce0ff;
      border-radius: 4px;
      padding: 10px;
      color: #333;
      line-height: 1.6;
      margin: 10px 0px;
    }

    .info strong {
      display: block;
      margin-bottom: 4px;
      color: #0066cc;
    }
    
    .info a {
      color: #0066cc;
      text-decoration: none;
    }
  </style>
</head>

<body>
  <h1>Reprice</h1>
  <p>Repriceは、大手不動産ポータルサイトで中古物件の適正価格を表示することができるChrome拡張機能です。</p>
  <div class="toggle-section">
    <div class="section-title">物件種別</div>
    <div class="toggle-item">
      <span class="toggle-label">中古マンション</span>
      <label class="toggle-switch">
        <input type="checkbox" id="apartmentToggle" checked>
        <span class="toggle-slider"></span>
      </label>
    </div>
    <div class="toggle-item">
      <span class="toggle-label">中古一戸建て</span>
      <label class="toggle-switch">
        <input type="checkbox" id="houseToggle" checked>
        <span class="toggle-slider"></span>
      </label>
    </div>
  </div>
  <div class="chart-box">
    <div class="section-title">対応状況</div>
    <table class="compatability-chart">
      <thead>
        <tr>
          <th></th>
          <th>中古マンション</th>
          <th>中古一戸建て</th>
        </tr>
      </thead>
      <tbody>
        <tr class="data-row">
          <td class="platform-name">SUUMO</td>
          <td class="table-icon">
            <i class="bi bi-check-lg"></i>
          </td>
          <td class="table-icon">
            <i class="bi bi-x"></i>
          </td>
        </tr>
        <tr class="data-row">
          <td class="platform-name">アットホーム</td>
          <td class="table-icon">
            <i class="bi bi-check-lg"></i>
          </td>
          <td class="table-icon">
            <i class="bi bi-triangle"></i>
          </td>
        </tr>
        <tr class="data-row">
          <td class="platform-name">Yahoo!不動産</td>
          <td class="table-icon">
            <i class="bi bi-check-lg"></i>
          </td>
          <td class="table-icon">
            <i class="bi bi-triangle"></i>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
  <div class="info">
    <strong>注意</strong>
    <a href="https://github.com/smartfoloo/reprice/blob/main/README.md" target="_blank" rel="noopener noreferrer">GitHubのREADME</a>をご確認の上、ご利用ください。
  </div>

  <script src="popup.js"></script>
</body>

</html>
