<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=LINE+Seed+JP&display=swap');

    body {
      width: 300px;
      padding: 16px;
      font-family: 'LINE Seed JP', sans-serif;
      font-size: 13px;
    }

    h1 {
      font-size: 18px;
      margin: 0 0 12px;
      font-weight: 800;
    }

    h2 {
      font-size: 14px;
    }

    p {
      line-height: 1.5;
    }

    .logo-mark {
      width: 48px;
      height: 48px;
      margin-bottom: 20px;
      border-radius: 12px;
      box-shadow: 0 5px 14px rgba(0, 0, 0, 0.3);
    }

    .chart-box {
      margin: 20px 0px;
    }

    .section-title {
      font-weight: 600;
      font-size: 12px;
      color: #0066cc;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .compatability-chart {
      width: 100%;
      margin-top: 8px;
    }

    th, td {
      padding: 5px;
    }

    .table-icon {
      font-size: 18px;
    }

    .info {
      background: #f0f7ff;
      border: 1px solid #cce0ff;
      border-radius: 4px;
      padding: 10px;
      color: #333;
      line-height: 1.6;
      margin: 10px 0px;
    }

    .info strong {
      display: block;
      margin-bottom: 4px;
      color: #0066cc;
    }
    
    a {
      color: #0066cc;
      text-decoration: none;
    }

    p {
      margin: 0;
    }
  </style>
</head>

<body>
  <img src="icons/icon128.png" alt="" class="logo-mark">
  <h1>Reprice</h1>
  <p>Repriceは、大手不動産ポータルサイトで中古物件の適正価格を表示することができるChrome拡張機能です。</p>
  <div class="chart-box">
    <div class="section-title">対応状況</div>
    <table class="compatability-chart">
      <thead>
        <tr>
          <th></th>
          <th>中古マンション</th>
          <th>中古一戸建て</th>
        </tr>
      </thead>
      <tbody>
        <tr class="data-row">
          <td class="platform-name">SUUMO</td>
          <td class="table-icon">
            <i class="bi bi-check-lg"></i>
          </td>
          <td class="table-icon">
            <i class="bi bi-triangle"></i>
          </td>
        </tr>
        <tr class="data-row">
          <td class="platform-name">アットホーム</td>
          <td class="table-icon">
            <i class="bi bi-check-lg"></i>
          </td>
          <td class="table-icon">
            <i class="bi bi-triangle"></i>
          </td>
        </tr>
        <tr class="data-row">
          <td class="platform-name">Yahoo!不動産</td>
          <td class="table-icon">
            <i class="bi bi-check-lg"></i>
          </td>
          <td class="table-icon">
            <i class="bi bi-triangle"></i>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
  <div class="info">
    <strong>注意</strong>
    <a href="https://github.com/smartfoloo/reprice/blob/main/README.md" target="_blank" rel="noopener noreferrer">GitHubのREADME</a>をご確認の上、ご利用ください。
  </div>
  <p>出典：国土交通省 不動産情報ライブラリ</p>
  <a href="https://www.reinfolib.mlit.go.jp/" target="_blank" rel="noopener noreferrer"><p>https://www.reinfolib.mlit.go.jp/</p></a>
</body>

</html>
